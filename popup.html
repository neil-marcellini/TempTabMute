<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Main page -->
  <div id="page-main" class="page container">
    <h1>TempTabMute</h1>
    <p id="tab-title" class="tab-title"></p>

    <button id="mute-btn" class="mute-btn">Mute 30s</button>

    <div id="countdown-section" class="countdown-section hidden">
      <div class="countdown-label">Unmuting in</div>
      <div id="countdown" class="countdown">--:--</div>
      <button id="unmute-btn" class="unmute-btn">Unmute Now</button>
    </div>

    <button id="settings-btn" class="nav-btn">Settings</button>
  </div>

  <!-- Settings page -->
  <div id="page-settings" class="page container hidden">
    <button id="back-btn" class="back-btn">&larr; Back</button>
    <h2>Duration</h2>

    <div class="custom-input-group">
      <input id="custom-input" type="text" class="custom-input" placeholder="e.g. 1h 3m, 70s, 3m" spellcheck="false">
      <button id="custom-set-btn" class="custom-set-btn">Set</button>
    </div>
    <div id="parse-hint" class="parse-hint"></div>

    <div class="presets-label">Presets</div>
    <div id="presets" class="presets"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
